spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contract_detector
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

contract-detector:
  capture:
    enabled: true
    sample-rate: 1.0
  impact-analysis:
    enabled: true
    exclude-packages: "java, org.springframework"

logging:
  level:
    root: INFO
    com.contractdetector: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
